
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Company Website</title>
  <meta name="description" content="Official company website." />

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/home.css" />
  <link rel="stylesheet" href="./css/responsive.css" />
  <script src="./js/main.js" defer></script>
</head>

<body>
  <div data-site-header></div>

  <main>
    <section class="home-hero-slider" aria-label="Main visual images">
      <div class="home-hero-track">
        <article class="home-hero-slide">
          <img src="./images/대문1.jpg" alt="" draggable="false" />
        </article>
        <article class="home-hero-slide">
          <img src="./images/대문2.jpg" alt="" draggable="false" />
        </article>
        <article class="home-hero-slide">
          <img src="./images/대문3.jpg" alt="" draggable="false" />
        </article>
      </div>
      <button class="home-hero-arrow home-hero-arrow-prev" type="button" aria-label="Previous image"></button>
      <button class="home-hero-arrow home-hero-arrow-next" type="button" aria-label="Next image"></button>
      <div class="home-hero-pagination" aria-label="Slide pagination"></div>
    </section>
  </main>

  <div data-site-footer></div>
</body>
</html>
